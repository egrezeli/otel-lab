apiVersion: 1

datasources:
  - name: Jaeger
    type: jaeger
    url: http://jaeger:16686
    isDefault: false

  - name: Loki
    type: loki
    url: http://loki:3100
    isDefault: true
    jsonData:
      derivedFields:
        - name: TraceID
          matcherRegex: '"traceId":"(\w+)"'
          url: '$${__value.raw}'
          datasourceUid: jaeger_uid
          urlDisplayLabel: "Ver no Jaeger"

  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090
    isDefault: false

  - name: Jaeger (link)
    type: jaeger
    url: http://jaeger:16686
    uid: jaeger_uid
