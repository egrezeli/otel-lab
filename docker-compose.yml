services:

  # ── Banco de dados ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ordersdb
      POSTGRES_USER:     otellab
      POSTGRES_PASSWORD: otellab
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otellab -d ordersdb"]
      interval: 5s
      retries: 10

  # ── Aplicação: 4 serviços encadeados ──────────────────────────────────────

  api-gateway:
    build: ./api-gateway
    ports:
      - "3000:3000"
    environment:
      SERVICE_NAME:      api-gateway
      OTEL_SERVICE_NAME: api-gateway
      ORDER_SERVICE_URL: http://order-service:3001
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      - otel-collector
      - order-service

  order-service:
    build: ./order-service
    ports:
      - "3011:3001"
    environment:
      SERVICE_NAME:          order-service
      OTEL_SERVICE_NAME:     order-service
      INVENTORY_SERVICE_URL: http://inventory-service:3002
      PAYMENT_SERVICE_URL:   http://payment-service:8080
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      DATABASE_URL: postgresql://otellab:otellab@postgres:5432/ordersdb
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
      inventory-service:
        condition: service_started
      payment-service:
        condition: service_started

  inventory-service:
    build: ./inventory-service
    ports:
      - "3012:3002"
    environment:
      SERVICE_NAME:      inventory-service
      OTEL_SERVICE_NAME: inventory-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      DATABASE_URL: postgresql://otellab:otellab@postgres:5432/ordersdb
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

  payment-service:
    build: ./service-b
    ports:
      - "8080:8080"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      DATABASE_URL: jdbc:postgresql://postgres:5432/ordersdb
      DB_USER: otellab
      DB_PASS: otellab
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

  # ── Load Bot ────────────────────────────────────────────────────────────────

  load-bot:
    build: ./load-bot
    environment:
      API_URL: http://api-gateway:3000
    depends_on:
      - api-gateway
    restart: unless-stopped

  # ── OpenTelemetry Collector ────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otel/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"

  # ── Traces: Jaeger ─────────────────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:1.58
    ports:
      - "16686:16686"
      - "4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # ── Logs: Loki ─────────────────────────────────────────────────────────────

  loki:
    image: grafana/loki:3.1.0
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  # ── Métricas: Prometheus ───────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # ── Visualização: Grafana ──────────────────────────────────────────────────

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3030:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
      - prometheus
      - jaeger

volumes:
  postgres_data:
